<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Discover Coco Noir luxury perfume - an enigmatic blend of rare oud, midnight jasmine, and aged amber." />
    <title>Coco Noir | Premium Perfume Landing Page</title>
    <link rel="stylesheet" href="icons.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="grid-container">
        <!-- ==================== HEADER ==================== -->
        <header id="header" role="banner">
            <div class="left-container">
                <button id="openBtn" type="button" class="icon-button hamburger" aria-label="open sidebar"
                    onclick="openNav()"></button>
            </div>

            <!-- Logo & Brand -->
            <a href="#home" class="logo-link" aria-label="Coco Noir Home">
                <h1>Coco</h1>
            </a>

            <nav class="sidenav" aria-label="Primary navigation" id="mySideNav">
                <button id="closeBtn" type="button" class="icon-button x-icon" aria-label="Close sidebar"
                    onclick="closeNav()"></button>
                <ul>
                    <li><a href="#collection">Collection</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>

            <!-- Header Actions -->
            <div class="right-container" aria-label="Header actions">
                <button type="button" aria-label="Search products" class="icon-button search">
                </button>
                <button type="button" aria-label="Shopping cart" class="icon-button cart">
                </button>
            </div>
            <div id="overlay" class="overlay" onclick="closeNav()"></div>
        </header>

    </div>
    <script src="script.js"></script>
</body>

</html>
