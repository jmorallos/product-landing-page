<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Aura Perfium Landing Page</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="grid-container">
            <header>
                <div class="h1-container">
                    <h1>AURA</h1>
                </div>
                <nav class="navigation">
                    <ul>
                        <li><a href="#">Collection</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
                <div class="left-container">
                    <button><span class="icon icon-search"></span></button>
                    <button><span class="icon icon-cart"></span></button>
                </div>
            </header>

            <main>
                <section class="images-section">
                    <div class="main-image-container"></div>
                    <div class="small-images-container">
                        <div class="image-small image1"></div>
                        <div class="image-small image2"></div>
                        <div class="image-small image3"></div>
                    </div>
                </section>
                <section class="text-section">
                    <article>
                        <h3>Aura Noir</h3>
                        <p>An enigmatic blend of rare oud, midnight jasmine,and aged amber. Each note unfolds like a whispered secret, leaving an unforgettable trail of sophistication.</p>
                        <p class="price">$285 <span class="old-price">$340</span></p>

                        <div class="sizes-btn-container">
                            <button class="size-btn">30ml</button>
                            <button class="size-btn">50ml</button>
                            <button class="size-btn">100ml</button>
                        </div>
                        <button class="CTA-addtocart">Add to Cart</button>
                    </article>
                    <div class="accordion-container"></div>
                </section>
            </main>
        </div>
    </body>
</html>
